<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Click</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      min-height: 100%;
      transition: background-color 0.4s ease;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a5f7a;
    }

    .main-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding-top: 0;
      margin-top: 64px;
    }

    .stats-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .stats-time {
      font-family: sans-serif;
      font-size: 28px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.95);
    }

    .stats-row {
      display: flex;
      gap: 20px;
      font-family: sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
    }

    .fish-container {
      cursor: pointer;
      animation: rotate 8s linear infinite;
    }

    .fish-container:hover {
      filter: brightness(1.1);
    }

    .fish-container:active {
      transform: scale(0.98);
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .fish-svg {
      width: 200px;
      height: 120px;
      display: block;
    }

    .joystick-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 48px;
    }

    .joystick-base {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.5);
      position: relative;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .joystick-stick {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(0, 0, 0, 0.2);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .joystick-base.dragging .joystick-stick {
      transition: none;
    }

    .joystick-stick {
      transition: transform 0.05s ease-out;
    }
  </style>
</head>
<body>
  <div class="main-column">
    <div class="stats-panel" id="statsPanel">
      <div class="stats-time" id="statTime">0:00</div>
      <div class="stats-row">
        <span>Score: <strong id="statScore">0</strong></span>
        <span>Accuracy: <strong id="statAccuracy">0</strong>%</span>
        <span>Misses: <strong id="statMisses">0</strong></span>
      </div>
    </div>
    <div class="fish-container" id="fishContainer" title="Click for a new background color!">
      <svg class="fish-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Fish body -->
        <ellipse cx="100" cy="60" rx="55" ry="28" fill="#ff9f43" stroke="#e67e22" stroke-width="2"/>
        <!-- Tail -->
        <path d="M 155 60 L 195 35 L 195 85 Z" fill="#ff9f43" stroke="#e67e22" stroke-width="2"/>
        <!-- Eye -->
        <circle cx="135" cy="52" r="10" fill="#fff"/>
        <circle cx="138" cy="50" r="5" fill="#2c3e50"/>
        <!-- Fin -->
        <path d="M 70 35 Q 85 25 95 35 Q 85 45 70 35" fill="#e67e22" opacity="0.9"/>
        <path d="M 75 85 Q 90 95 100 85 Q 90 75 75 85" fill="#e67e22" opacity="0.9"/>
        <!-- Scales hint -->
        <path d="M 60 55 Q 70 50 75 58 M 50 58 Q 60 53 65 61 M 40 61 Q 50 56 55 64" stroke="#e67e22" stroke-width="1" fill="none" opacity="0.5"/>
      </svg>
    </div>

    <div class="joystick-container">
      <div class="joystick-base" id="joystickBase">
        <div class="joystick-stick" id="joystickStick"></div>
      </div>
    </div>
  </div>

  <script>
    /* Prompt: Website features above the fish: Time (larger), Score, Accuracy%, Misses. */
    const body = document.body;
    const fishContainer = document.getElementById('fishContainer');
    const joystickBase = document.getElementById('joystickBase');
    const joystickStick = document.getElementById('joystickStick');
    const statTime = document.getElementById('statTime');
    const statScore = document.getElementById('statScore');
    const statAccuracy = document.getElementById('statAccuracy');
    const statMisses = document.getElementById('statMisses');

    const UNITY_SERVER = location.protocol + '//' + location.hostname + ':8080';

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function pollStats() {
      fetch(UNITY_SERVER + '/stats').then(function (r) { return r.json(); }).then(function (data) {
        statTime.textContent = formatTime(data.time);
        statScore.textContent = data.score;
        statAccuracy.textContent = typeof data.accuracy === 'number' ? data.accuracy.toFixed(1) : data.accuracy;
        statMisses.textContent = data.misses;
      }).catch(function () {});
    }

    setInterval(pollStats, 500);
    pollStats();

    function randomColor() {
      const r = Math.floor(Math.random() * 256);
      const g = Math.floor(Math.random() * 256);
      const b = Math.floor(Math.random() * 256);
      return { css: `rgb(${r}, ${g}, ${b})`, r, g, b };
    }

    fishContainer.addEventListener('click', function () {
      const { css, r, g, b } = randomColor();
      body.style.backgroundColor = css;
      fetch(`${UNITY_SERVER}/command?color=${r},${g},${b}`).catch(function () {});
    });

    (function () {
      const radius = 57;
      let joyX = 0;
      let joyZ = 0;

      function sendJoystick() {
        const x = Math.max(-1, Math.min(1, joyX));
        const z = Math.max(-1, Math.min(1, joyZ));
        fetch(`${UNITY_SERVER}/joystick?x=${encodeURIComponent(x)}&z=${encodeURIComponent(z)}`).catch(function () {});
      }

      function setStickPosition(px, py) {
        const rect = joystickBase.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        let dx = px - cx;
        let dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > radius) {
          dx = (dx / dist) * radius;
          dy = (dy / dist) * radius;
        }
        joyX = dx / radius;
        joyZ = -dy / radius;
        joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        sendJoystick();
      }

      function centerStick() {
        joyX = 0;
        joyZ = 0;
        joystickStick.style.transform = 'translate(-50%, -50%)';
        sendJoystick();
      }

      function onPointerDown(e) {
        if (typeof e.preventDefault === 'function') e.preventDefault();
        joystickBase.classList.add('dragging');
        setStickPosition(e.clientX, e.clientY);
      }

      function onPointerMove(e) {
        if (!joystickBase.classList.contains('dragging')) return;
        if (typeof e.preventDefault === 'function') e.preventDefault();
        setStickPosition(e.clientX, e.clientY);
      }

      function onPointerUp(e) {
        if (!joystickBase.classList.contains('dragging')) return;
        if (typeof e.preventDefault === 'function') e.preventDefault();
        joystickBase.classList.remove('dragging');
        centerStick();
      }

      joystickBase.addEventListener('mousedown', onPointerDown);
      window.addEventListener('mousemove', onPointerMove);
      window.addEventListener('mouseup', onPointerUp);

      joystickBase.addEventListener('touchstart', function (e) {
        e.preventDefault();
        onPointerDown(e.touches[0]);
      }, { passive: false });
      window.addEventListener('touchmove', function (e) {
        if (!joystickBase.classList.contains('dragging')) return;
        e.preventDefault();
        if (e.touches.length) onPointerMove(e.touches[0]);
      }, { passive: false });
      window.addEventListener('touchend', function (e) {
        if (e.touches.length === 0) onPointerUp(e);
      }, { passive: false });
      window.addEventListener('touchcancel', function (e) {
        if (e.touches.length === 0) onPointerUp(e);
      }, { passive: false });
    })();
  </script>
</body>
</html>
