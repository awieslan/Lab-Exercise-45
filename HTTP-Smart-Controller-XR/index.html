<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Fish Click - WebXR AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a5f7a; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      z-index: 100;
    }
    #ARButton, [id^="ar-button"] { z-index: 50; }
  </style>
</head>
<body>
  <div id="info">Tap START AR. Point your phone at the ground. Tap the fish to change the color.</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { InteractiveGroup } from 'three/addons/interactive/InteractiveGroup.js';

    const UNITY_SERVER = location.protocol + '//' + location.hostname + ':8080';

    function randomColor() {
      const r = Math.floor(Math.random() * 256);
      const g = Math.floor(Math.random() * 256);
      const b = Math.floor(Math.random() * 256);
      return { r, g, b };
    }

    function sendColorToUnity(r, g, b) {
      fetch(`${UNITY_SERVER}/command?color=${r},${g},${b}`).catch(() => {});
    }

    // Scene setup - AR needs transparent background to see real world
    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.setAnimationLoop(animate);
    document.body.appendChild(renderer.domElement);

    // Custom AR button using local-floor (y=0 = ground) for fish placement
    function createARButton() {
      const btn = document.createElement('button');
      btn.id = 'ARButton';
      btn.style.cssText = 'position:absolute;bottom:20px;left:calc(50% - 50px);width:100px;padding:12px 6px;border:1px solid #fff;border-radius:4px;background:rgba(0,0,0,0.5);color:#fff;font:13px sans-serif;text-align:center;z-index:999;cursor:pointer;';
      btn.textContent = 'START AR';
      let session = null;
      btn.onclick = async () => {
        if (session) {
          session.end();
          return;
        }
        try {
          session = await navigator.xr.requestSession('immersive-ar', { optionalFeatures: ['local-floor'] });
          renderer.xr.setReferenceSpaceType('local-floor');
          await renderer.xr.setSession(session);
          btn.textContent = 'STOP AR';
          session.addEventListener('end', () => { session = null; btn.textContent = 'START AR'; });
        } catch (e) {
          console.warn('AR session failed:', e);
        }
      };
      if (!('xr' in navigator)) {
        btn.textContent = 'AR NOT SUPPORTED';
        btn.disabled = true;
      } else {
        navigator.xr.isSessionSupported('immersive-ar').then(supported => {
          if (!supported) { btn.textContent = 'AR NOT SUPPORTED'; btn.disabled = true; }
        });
      }
      return btn;
    }
    document.body.appendChild(createARButton());

    // Lights
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    scene.add(new THREE.DirectionalLight(0xffffff, 1).position.set(2, 5, 3));

    // 3D Fish (simple elongated body + tail)
    const fishBodyGeo = new THREE.SphereGeometry(0.35, 32, 32);
    const fishMaterial = new THREE.MeshStandardMaterial({
      color: 0xff9f43,
      roughness: 0.6,
      metalness: 0.1,
    });
    const fishBody = new THREE.Mesh(fishBodyGeo, fishMaterial);
    fishBody.scale.set(1.4, 0.6, 0.7);
    fishBody.position.z = -0.05;

    const tailGeo = new THREE.ConeGeometry(0.25, 0.5, 16);
    const fishTail = new THREE.Mesh(tailGeo, fishMaterial);
    fishTail.rotation.z = Math.PI / 2;
    fishTail.position.set(0.5, 0, 0);

    // Idle rotation
    let time = 0;

    // Controllers - in AR on phone, controller 0 = screen tap / primary input
    const controller1 = renderer.xr.getController(0);
    const controller2 = renderer.xr.getController(1);
    scene.add(controller1);
    scene.add(controller2);

    // Interactive group - fish responds to tap (AR) and pointer (desktop)
    const interactiveGroup = new InteractiveGroup();
    interactiveGroup.listenToXRControllerEvents(controller1);
    interactiveGroup.listenToXRControllerEvents(controller2);
    interactiveGroup.listenToPointerEvents(renderer, camera);
    interactiveGroup.position.set(0, 0, -2);
    interactiveGroup.rotation.y = Math.PI / 4;
    interactiveGroup.add(fishBody, fishTail);
    scene.add(interactiveGroup);

    function onFishSelect() {
      const { r, g, b } = randomColor();
      if (scene.background) scene.background.setRGB(r / 255, g / 255, b / 255);
      sendColorToUnity(r, g, b);
    }

    fishBody.addEventListener('click', onFishSelect);
    fishTail.addEventListener('click', onFishSelect);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate(t, frame) {
      time += 0.01;
      interactiveGroup.rotation.y = Math.PI / 4 + Math.sin(time) * 0.2;
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
